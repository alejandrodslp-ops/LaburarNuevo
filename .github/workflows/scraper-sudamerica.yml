name: Scraper Sudamérica

on:
  schedule:
    # Todos los días 4:00am Uruguay (07:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Permite correrlo manualmente desde GitHub → Actions → Run workflow
    inputs:
      pais:
        description: 'País (AR, CL, CO, PE, PY) — vacío = todos'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper-sa/package.json

      - name: Instalar dependencias
        working-directory: scraper-sa
        run: npm install

      - name: Correr scraper
        working-directory: scraper-sa
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PAIS: ${{ github.event.inputs.pais }}
        run: node index.js
