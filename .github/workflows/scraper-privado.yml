name: Scraper Ofertas Privadas

on:
  schedule:
    # 1 vez por día: mediodía Uruguay (UTC-3)
    - cron: '0 15 * * *'   # 12pm UY
  workflow_dispatch:
    inputs:
      pais:
        description: 'País (UY, AR, CL, CO) — vacío = todos'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scraper-privado/package.json

      - name: Instalar dependencias
        working-directory: scraper-privado
        run: npm install

      - name: Correr scraper
        working-directory: scraper-privado
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PAIS: ${{ github.event.inputs.pais }}
        run: node index.js
