name: Scraper Global (33 países)

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC = 5am UY
    - cron: '0 20 * * *'  # 8pm UTC = 5pm UY
  workflow_dispatch:
    inputs:
      pais:
        description: 'País ISO (UY, AR, IN...) — vacío = todos'
        required: false
        default: ''

jobs:
  scrape-single:
    if: ${{ github.event.inputs.pais != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Correr scraper — país específico
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scraper-concursos" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d "{\"pais\":\"${{ github.event.inputs.pais }}\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY_RESP=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE"
          echo "$BODY_RESP" | python3 -m json.tool 2>/dev/null || echo "$BODY_RESP"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

  # 7 jobs paralelos — cada uno max ~70s
  scrape-brasil:
    if: ${{ github.event.inputs.pais == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Brasil
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scraper-concursos" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"paises":["BR"]}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "HTTP: $HTTP_CODE"
          echo "$RESPONSE" | head -1 | python3 -m json.tool 2>/dev/null || echo "$RESPONSE" | head -1
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

  scrape-latam-sur:
    if: ${{ github.event.inputs.pais == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: LatAm Sur
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scraper-concursos" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"paises":["UY","AR","CL","CO","PE","PY","BO","EC"]}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "HTTP: $HTTP_CODE"
          echo "$RESPONSE" | head -1 | python3 -m json.tool 2>/dev/null || echo "$RESPONSE" | head -1
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

  scrape-latam-norte:
    if: ${{ github.event.inputs.pais == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: LatAm Norte
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scraper-concursos" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"paises":["MX","VE","CU","CR","GT","SV","HN","NI","PA","DO"]}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "HTTP: $HTTP_CODE"
          echo "$RESPONSE" | head -1 | python3 -m json.tool 2>/dev/null || echo "$RESPONSE" | head -1
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

  scrape-europa-oeste:
    if: ${{ github.event.inputs.pais == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Europa Oeste
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scraper-concursos" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"paises":["ES","PT","IT","FR"]}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "HTTP: $HTTP_CODE"
          echo "$RESPONSE" | head -1 | python3 -m json.tool 2>/dev/null || echo "$RESPONSE" | head -1
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

  scrape-europa-este:
    if: ${{ github.event.inputs.pais == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Europa Este + CH
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scraper-concursos" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"paises":["DE","GB","SE","NO","CH"]}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "HTTP: $HTTP_CODE"
          echo "$RESPONSE" | head -1 | python3 -m json.tool 2>/dev/null || echo "$RESPONSE" | head -1
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

  scrape-mundo:
    if: ${{ github.event.inputs.pais == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Anglosajones y Asia
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scraper-concursos" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"paises":["US","CA","AU","JP","IN"]}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "HTTP: $HTTP_CODE"
          echo "$RESPONSE" | head -1 | python3 -m json.tool 2>/dev/null || echo "$RESPONSE" | head -1
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

  verificar:
    needs: [scrape-brasil, scrape-latam-sur, scrape-latam-norte, scrape-europa-oeste, scrape-europa-este, scrape-mundo]
    if: always() && (github.event.inputs.pais == '' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Restaurar conteos anteriores
        uses: actions/cache@v4
        with:
          path: /tmp/nexu_counts_prev.json
          key: nexu-counts-${{ github.run_number }}
          restore-keys: nexu-counts-

      - name: Verificar conteos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          from datetime import date

          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_ANON_KEY"]
          hoy = date.today().isoformat()
          PREV_FILE = "/tmp/nexu_counts_prev.json"

          prev = {}
          if os.path.exists(PREV_FILE):
              try:
                  with open(PREV_FILE) as f: prev = json.load(f)
              except: pass

          PAISES = ["UY","AR","BR","ES","DE","US","FR","CA","AU","GB","MX","CL","PE","CO",
                    "PY","BO","EC","VE","CR","GT","SV","HN","NI","PA","DO","CU","PT","IN","JP","SE","IT","NO","CH"]
          MINIMOS = {"UY":50,"AR":100,"BR":50,"ES":20,"DE":20,"US":10,"FR":20,"CA":10,"AU":20,"GB":10,"MX":10,"CL":20,"PE":10,"CO":10}

          current = {}
          for pais in PAISES:
              endpoint = f"{url}/rest/v1/concursos?select=pais&pais=eq.{pais}&activo=eq.true&or=(fecha_cierre.is.null,fecha_cierre.gte.{hoy})"
              req = urllib.request.Request(endpoint, headers={"Authorization":f"Bearer {key}","apikey":key,"Prefer":"count=exact"})
              try:
                  with urllib.request.urlopen(req) as resp:
                      cr = resp.headers.get("Content-Range","0/0")
                      current[pais] = int(cr.split("/")[-1]) if "/" in cr else 0
              except: current[pais] = -1

          total_global = sum(v for v in current.values() if v > 0)
          print(f"\n{'='*50}")
          print(f"TOTAL GLOBAL: {total_global:,} llamados activos")
          print(f"{'='*50}")
          print("\nPaís | Actual | Anterior | Cambio")
          print("-----|--------|----------|-------")
          alertas = []

          for pais in PAISES:
              actual = current.get(pais,-1)
              anterior = prev.get(pais,None)
              if anterior is not None and anterior > 0 and actual >= 0:
                  cambio = actual - anterior
                  pct = (cambio/anterior)*100
                  cambio_str = f"{'📈' if cambio>0 else '📉'} {cambio:+d} ({pct:+.0f}%)" if abs(pct)>=40 and abs(cambio)>=10 else f"{cambio:+d} ({pct:+.0f}%)"
              else:
                  cambio_str = "(primera)" if anterior is None else "—"
              print(f"  {pais:4} | {actual:6} | {str(anterior or '—'):8} | {cambio_str}")
              minimo = MINIMOS.get(pais)
              if actual >= 0 and minimo and actual < minimo:
                  alertas.append(f"⚠️  {pais}: {actual} (mínimo: {minimo})")

          try:
              with open(PREV_FILE,"w") as f: json.dump(current,f)
          except: pass

          if alertas:
              print("\n===== ALERTAS =====")
              for a in alertas: print(f"  {a}")
          else:
              print("\n✅ Sin anomalías.")
          EOF
